<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div>
          <a class="logo-text" href="index.html">👾 Gayeon's Portfolio</a>
        </div>

        <div class="menu">
          <a href="index.html">Home</a>
          <a href="projects.html">Projects</a>
          <a href="skills.html">Skills</a>
          <a href="contact.html" class="active">Contact</a>
          <button id="theme-toggle" class="theme-btn">🌙</button>
        </div>
      </nav>
    </header>

    <main class="container">
      <section class="textarea">
        <h1>Get In Touch</h1>
        <p>Any questions or remarks? Let's discuss together !</p>
      </section>

      <section class="contact-grid">
        <div class="contact-info">
          <h2>Contact Information</h2>

          <div class="info-list">
            <div class="info-item">
              <div class="icon-box">
                <img src="icons/mail-svgrepo-com.svg" />
              </div>
              <div class="info-text">
                <strong>Email</strong>
                <p>lgy3131@naver.com</p>
              </div>
            </div>

            <div class="info-item">
              <div class="icon-box">
                <img src="icons/phone-svgrepo-com.svg" />
              </div>
              <div class="info-text">
                <strong>Phone</strong>
                <p>010-7673-1258</p>
              </div>
            </div>

            <div class="info-item">
              <div class="icon-box">
                <img src="icons/location-pin-svgrepo-com.svg" />
              </div>
              <div class="info-text">
                <strong>Location</strong>
                <p>Seoul, Korea</p>
              </div>
            </div>
          </div>
        </div>

        <form class="contact-form">
          <div class="form-row">
            <div class="input-group">
              <label>Name</label>
              <input type="text" placeholder="Your name" />
            </div>

            <div class="input-group">
              <label>Email</label>
              <input type="email" placeholder="your@email.com" />
            </div>
          </div>

          <div class="input-group">
            <label>Subject</label>
            <input type="text" placeholder="What's this about?" />
          </div>

          <div class="input-group">
            <label>Message</label>
            <textarea placeholder="Tell me your message..."></textarea>
          </div>

          <button type="submit">
            <img src="icons/send-svgrepo-com.svg" />
            Send Message
          </button>
        </form>
      </section>
    </main>

    <footer>&copy; 2026 Gayeon's Portfolio</footer>
    <script src="theme.js"></script>
  </body>
</html>
